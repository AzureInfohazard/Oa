<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oa — procedural universe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle at 30% 50%, #1a3a2a, transparent 70%);
            opacity: 0.15;
            pointer-events: none;
        }
        h1 { font-size: 5rem; font-weight: 200; letter-spacing: -0.05em; }
        h1 span { font-weight: 700; }
        p { color: #888; font-size: 1.1rem; margin-top: 1rem; max-width: 400px; text-align: center; line-height: 1.6; }
        .links { margin-top: 3rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
        .links a {
            color: #4ade80;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border: 1px solid #1a3a2a;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .links a:hover { border-color: #4ade80; background: #4ade8008; }
        footer { margin-top: 5rem; font-size: 0.8rem; color: #333; }
    </style>
</head>
<body>
    <h1><span>Oa</span></h1>
    <p>A procedural universe. Three galaxies. One door.</p>
    <div class="links">
        <a href="/roadmap">Roadmap</a>
<a href="https://reis.echoed.us">Reis</a>
    </div>
    <footer>extends perception, makes you want to get lost</footer>
</body>
</html>
